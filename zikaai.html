<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIKA AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.login-box,
.chat-container{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:25px;
width:90%;
max-width:500px;
box-shadow:0 0 30px rgba(99,102,241,.4);
}

.logo{
text-align:center;
font-size:35px;
font-weight:bold;
background:linear-gradient(90deg,#60a5fa,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.1);
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.chat-container{
display:none;
height:85vh;
}

.chat-box{
height:75%;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:12px;
}

.user{
background:#2563eb;
text-align:right;
}

.bot{
background:#7c3aed;
}

.chat-input{
display:flex;
gap:10px;
}

.chat-input input{
margin:0;
}

.chat-input button{
width:120px;
}

.status{
text-align:center;
color:#c4b5fd;
margin-top:10px;
}
</style>
</head>
<body>

<div class="login-box" id="loginBox">
<div class="logo">ZIKA AI</div>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">MASUK</button>

<div class="status">
Secure Access System
</div>
</div>

<div class="chat-container" id="chatContainer">

<div class="logo">ZIKA AI</div>

<div class="chat-box" id="chatBox">
<div class="msg bot">
Halo! Saya ZIKA AI. Ketik perintah Anda.
</div>
</div>

<div class="chat-input">
<input type="text" id="userInput" placeholder="Tulis pesan...">
<button onclick="sendMessage()">Kirim</button>
</div>

</div>

<script>

const USERNAME = "zika091";
const PASSWORD = "0001";

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user===USERNAME && pass===PASSWORD){

document.getElementById("loginBox").style.display="none";
document.getElementById("chatContainer").style.display="block";

}else{
alert("Username atau Password Salah!");
}
}

function sendMessage(){

let input=document.getElementById("userInput");
let text=input.value.trim();

if(text==="") return;

let chat=document.getElementById("chatBox");

chat.innerHTML += `
<div class="msg user">${text}</div>
`;

let reply="Saya tidak memahami perintah tersebut.";

if(text.toLowerCase().includes("halo")){
reply="Halo juga! Ada yang bisa saya bantu?";
}
else if(text.toLowerCase().includes("nama")){
reply="Nama saya ZIKA AI.";
}
else if(text.toLowerCase().includes("jam")){
reply="Jam sekarang: " + new Date().toLocaleTimeString();
}
else if(text.toLowerCase().includes("tanggal")){
reply="Tanggal hari ini: " + new Date().toLocaleDateString();
}
else if(text.toLowerCase().includes("siapa kamu")){
reply="Saya ZIKA AI, asisten virtual futuristik.";
}

setTimeout(()=>{
chat.innerHTML += `
<div class="msg bot">${reply}</div>
`;
chat.scrollTop=chat.scrollHeight;
},500);

input.value="";
}

</script>

</body>
</html>
