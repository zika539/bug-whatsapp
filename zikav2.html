<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIKA AI LOGIN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1600') center/cover;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        135deg,
        rgba(0,0,50,.7),
        rgba(80,0,120,.7)
    );
    backdrop-filter:blur(5px);
}

.login-box{
    position:relative;
    z-index:1;
    width:380px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(120,0,255,.5);
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    margin:auto;
    display:block;
    border:3px solid #00d9ff;
    box-shadow:0 0 20px #00d9ff;
}

h1{
    margin-top:15px;
    color:white;
    font-size:28px;
    text-shadow:0 0 15px #00d9ff;
}

.subtitle{
    color:#ccc;
    margin-bottom:25px;
    font-size:12px;
}

.input-box{
    margin:15px 0;
}

input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,.1);
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#ddd;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    color:white;
    background:linear-gradient(90deg,#00c6ff,#7b2cff);
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px #7b2cff;
}

#status{
    margin-top:15px;
    color:white;
    font-size:14px;
}

.success{
    color:#00ff95;
}

.error{
    color:#ff4d4d;
}

#panel{
    display:none;
    color:white;
}

.welcome{
    font-size:22px;
    margin-top:20px;
    text-shadow:0 0 20px cyan;
}
</style>
</head>
<body>

<div class="login-box">

<img class="logo"
src="https://i.imgur.com/8Km9tLL.png">

<h1>ZIKA AI</h1>
<p class="subtitle">Cyber Intelligence System</p>

<div id="loginForm">
    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button onclick="login()">LOGIN</button>

    <div id="status"></div>
</div>

<div id="panel">
    <h2 class="welcome">⚡ AKSES BERHASIL ⚡</h2>
    <p>Selamat datang di ZIKA AI SYSTEM</p>
</div>

</div>

<audio id="successSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>

<script>
function login(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let status = document.getElementById("status");

    if(user === "zika132" && pass === "001"){

        document.getElementById("successSound").play();

        status.innerHTML = "✔ Login Berhasil";
        status.className = "success";

        setTimeout(()=>{
            document.getElementById("loginForm").style.display="none";
            document.getElementById("panel").style.display="block";
        },1000);

    }else{

        status.innerHTML = "✖ Username atau Password Salah";
        status.className = "error";
    }
}
</script>

</body>
</html>
